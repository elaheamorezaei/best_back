services:
  backend:
    build: ./my_shop_backend
    container_name: shop-django-backend
    restart: always
    volumes:
      - sqlite_data:/app/db.sqlite3
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file: ./my_shop_backend/.env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./shop-template
      dockerfile: dockerfile
      target: runner
    container_name: shop-template-frontend
    restart: always
    env_file: ./shop-template/.env.production
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: shop-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_files:/staticfiles
      - media_files:/media
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  sqlite_data:
  static_files:
  media_files:
  certbot_data:
  certbot_www:
